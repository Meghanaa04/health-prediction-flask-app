<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            Edit Patient
        </h2>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text"
                       class="form-control"
                       name="full_name"
                       value="{{ patient[1] }}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Date of Birth</label>
                <input type="date"
                       class="form-control"
                       name="dob"
                       value="{{ patient[2] }}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email"
                       class="form-control"
                       name="email"
                       value="{{ patient[3] }}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Glucose</label>
                <input type="number"
                       step="0.01"
                       class="form-control"
                       name="glucose"
                       value="{{ patient[4] }}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Haemoglobin</label>
                <input type="number"
                       step="0.01"
                       class="form-control"
                       name="haemoglobin"
                       value="{{ patient[5] }}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Cholesterol</label>
                <input type="number"
                       step="0.01"
                       class="form-control"
                       name="cholesterol"
                       value="{{ patient[6] }}"
                       required>
            </div>

            <button type="submit" class="btn btn-primary">
                Update Patient
            </button>

            <a href="/" class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</div>

</body>
</html>
